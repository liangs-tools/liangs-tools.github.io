<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liangs Tools - Chrome Extensions</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 720px;
            margin: 60px auto;
            padding: 0 20px;
            color: #333;
            line-height: 1.6;
        }
        h1 { margin-bottom: 4px; }
        .tagline { color: #666; margin-bottom: 40px; }
        .extension { margin-bottom: 24px; }
        .extension h3 { margin-bottom: 4px; }
        .extension p { margin: 0; color: #555; }
        .extension a { color: #0969da; text-decoration: none; }
        .extension a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Liangs Tools</h1>
    <p class="tagline">Lightweight Chrome extensions that solve real problems.</p>

    <div class="extension">
        <h3><a href="./tab-limiter/">Tab Limiter</a></h3>
        <p>Automatically limit the number of open tabs to keep your browser fast and focused.</p>
    </div>
